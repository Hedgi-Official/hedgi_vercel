<?xml version="1.0" encoding="UTF-8"?>
<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with turquoise color -->
  <rect width="192" height="192" rx="32" fill="#1dd1a1"/>
  
  <!-- Building/House icon -->
  <g transform="translate(40, 50)">
    <!-- Three house shapes -->
    <path d="M15 25 L25 15 L35 25 L35 40 L15 40 Z" fill="none" stroke="black" stroke-width="3"/>
    <path d="M35 25 L45 15 L55 25 L55 40 L35 40 Z" fill="none" stroke="black" stroke-width="3"/>
    <path d="M55 25 L65 15 L75 25 L75 40 L55 40 Z" fill="none" stroke="black" stroke-width="3"/>
    
    <!-- Horizontal lines for structure -->
    <rect x="10" y="40" width="70" height="8" fill="none" stroke="black" stroke-width="3"/>
    <rect x="10" y="48" width="70" height="15" fill="none" stroke="black" stroke-width="3"/>
    <rect x="10" y="63" width="70" height="8" fill="none" stroke="black" stroke-width="3"/>
    
    <!-- Vertical dividers -->
    <line x1="30" y1="48" x2="30" y2="63" stroke="black" stroke-width="3"/>
    <line x1="50" y1="48" x2="50" y2="63" stroke="black" stroke-width="3"/>
  </g>
  
  <!-- Hedgi text -->
  <text x="96" y="150" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="black">Hedgi</text>
</svg>