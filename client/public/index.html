
<!DOCTYPE html>
<html>
  <head>
    <title>XTB WebSocket Client</title>
    <style>
      body { padding: 20px; font-family: Arial, sans-serif; }
      .rates { margin-top: 20px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
      th { background-color: #f2f2f2; }
      .error { color: red; }
    </style>
  </head>
  <body>
    <h1>XTB WebSocket Client</h1>
    <div class="login">
      <input type="text" id="userId" value="17474971" placeholder="User ID">
      <input type="password" id="password" value="xoh74681" placeholder="Password">
      <button onclick="connect()">Connect</button>
    </div>
    <div class="rates">
      <table>
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Ask</th>
            <th>Bid</th>
          </tr>
        </thead>
        <tbody id="ratesTable"></tbody>
      </table>
    </div>
    <script>
      let ws;

      function connect() {
        const userId = document.getElementById('userId').value;
        const password = document.getElementById('password').value;

        ws = new WebSocket('wss://ws.xtb.com/demo');

        ws.onopen = () => {
          console.log('Connected to XTB');
          login(userId, password);
        };

        ws.onmessage = (evt) => {
          const response = JSON.parse(evt.data);
          console.log('Received:', response);

          if (response.status === true) {
            if (response.streamSessionId) {
              console.log('Logged in successfully');
              getAllSymbols();
            } else if (response.returnData) {
              displaySymbols(response.returnData);
            }
          } else {
            console.error('Error:', response.errorDescr);
          }
        };

        ws.onclose = () => console.log('Disconnected');
        ws.onerror = (error) => console.error('Error:', error);
      }

      function login(userId, password) {
        send({
          command: "login",
          arguments: {
            userId: userId,
            password: password,
            appName: "WebSocket Example"
          }
        });
      }

      function getAllSymbols() {
        send({
          command: "getAllSymbols",
          arguments: {}
        });
      }

      function send(data) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(data));
        } else {
          console.error('WebSocket is not connected');
        }
      }

      function displaySymbols(symbols) {
        const table = document.getElementById('ratesTable');
        table.innerHTML = '';
        
        symbols.forEach(symbol => {
          const row = table.insertRow();
          row.insertCell(0).textContent = symbol.symbol;
          row.insertCell(1).textContent = symbol.ask;
          row.insertCell(2).textContent = symbol.bid;
        });
      }
    </script>
  </body>
</html>
