<html>
<head>
  <script src="https://sdk.mercadopago.com/js/v2"></script>
</head>
<body>
  <div id="cardPaymentBrick_container"></div>
  <script>
    const mp = new MercadoPago(process.env.MP_PUBLIC_KEY, {
      locale: 'en'
    });
    const bricksBuilder = mp.bricks();
    const renderCardPaymentBrick = async (bricksBuilder) => {
      const settings = {
        initialization: {
          amount: 100, // total amount to be paid
          payer: {
            email: "",
          },
        },
        customization: {
          visual: {
            style: {
              theme: 'default', // | 'dark' | 'bootstrap' | 'flat'
              customVariables: {
              },
            },
          },
          paymentMethods: {
            types: {
              excluded: ['debit_card']
            }, 
            maxInstallments: 1,
          },
        },
        callbacks: {
          onReady: () => {
            // callback called when the Brick is ready
          },
          onSubmit: (cardFormData) => {
            // callback called when the user clicks “Pay”
            const paymentPayload = {
              token:              cardFormData.token,
              installments:       cardFormData.installments,
              payment_method_id:  cardFormData.payment_method_id,   // ← grab the snake_case field
              transaction_amount: cardFormData.transaction_amount,
              description:        `Hedgi order for R$${cardFormData.transaction_amount}`,
              payer: {
                email:            cardFormData.payer.email,
                identification:   {
                  type:           cardFormData.payer.identification?.type   || "CPF",
                  number:         cardFormData.payer.identification?.number || ""
                },
                first_name:       cardFormData.payer.first_name || "HedgiCustomer"
              },
              txId:                TX_ID  
            };

            console.log("[iframe] Sending payment payload:", paymentPayload);

            return new Promise((resolve, reject) => {
              fetch("/process_payment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(paymentPayload)
              })
                .then((response) => {
                  resolve();
                })
                .catch((error) => {
                  reject();
                });
            });
          },
          onError: (error) => {
            // callback called to all error cases related to the Brick
          },
        },
      };
      window.cardPaymentBrickController = await bricksBuilder.create('cardPayment', 'cardPaymentBrick_container', settings);
    };
    renderCardPaymentBrick(bricksBuilder);
  </script>
</body>
</html>
