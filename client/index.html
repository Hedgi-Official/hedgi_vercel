<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=0.8, minimum-scale=0.5, maximum-scale=5.0, user-scalable=yes" />
    
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- PWA Configuration -->
    <meta name="theme-color" content="#1dd1a1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Hedgi" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- App Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=5" />
    <link rel="icon" type="image/png" sizes="32x32" href="/Hedgi.png?v=5" />
    <link rel="icon" type="image/png" sizes="16x16" href="/Hedgi.png?v=5" />
    <link rel="icon" type="image/png" sizes="192x192" href="/Hedgi.png?v=5" />
    <link rel="icon" type="image/png" sizes="512x512" href="/Hedgi.png?v=5" />
    <link rel="apple-touch-icon" href="/Hedgi.png?v=5" />
    <link rel="shortcut icon" href="/favicon.ico?v=5" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <title>Hedgi - Currency Hedging Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for cache management
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
          .then(function(registration) {
            console.log('SW registered with scope:', registration.scope);
          })
          .catch(function(error) {
            console.log('SW registration failed:', error);
          });
      }
    </script>
  </body>
</html>
