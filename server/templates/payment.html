<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Payment - Hedgi</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .payment-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        .amount-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .amount-display .amount {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
        }
        .amount-display .currency {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        #cardPaymentBrick_container {
            margin: 20px 0;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="header">
            <h1>Complete Payment to Place Hedge</h1>
        </div>
        
        <div class="amount-display">
            <div class="amount">R$ {{AMOUNT}}</div>
            <div class="currency">Brazilian Real</div>
        </div>
        
        <div id="cardPaymentBrick_container">
            <div class="loading">Loading payment form...</div>
        </div>
    </div>

    <script>
        const mp = new MercadoPago('{{PUBLIC_KEY}}', { locale: 'pt-BR' });
        const bricksBuilder = mp.bricks();

        const renderCardPaymentBrick = async () => {
            try {
                const settings = {
                    initialization: {
                        amount: {{AMOUNT}},
                    },
                    customization: {
                        paymentMethods: {
                            ticket: 'all',
                            bankTransfer: 'all',
                            creditCard: 'all',
                        },
                        visual: {
                            style: {
                                theme: 'default'
                            }
                        }
                    },
                    callbacks: {
                        onReady: () => {
                            console.log('Card payment brick ready');
                        },
                        onSubmit: async ({ selectedPaymentMethod, formData }) => {
                            console.log('Processing payment...', formData);
                            console.log('Selected payment method:', selectedPaymentMethod);
                            
                            try {
                                // Extract txId from URL parameters
                                const urlParams = new URLSearchParams(window.location.search);
                                const txId = urlParams.get('txId');
                                
                                // Add txId and payment_method_id to the form data
                                const paymentPayload = {
                                    ...formData,
                                    txId: txId,
                                    payment_method_id: selectedPaymentMethod,
                                    paymentMethodId: selectedPaymentMethod // Include both formats for compatibility
                                };
                                
                                console.log('Payment payload with txId and payment_method_id:', paymentPayload);
                                
                                const response = await fetch('/process_payment', {
                                    method: 'POST',
                                    headers: { 
                                        'Content-Type': 'application/json' 
                                    },
                                    body: JSON.stringify(paymentPayload)
                                });
                                
                                const data = await response.json();
                                console.log('Payment response:', data);
                                
                                if (data.status === 'approved') {
                                    window.location.href = `/payment_status/${data.id}`;
                                } else {
                                    window.location.href = `/payment_status/failure`;
                                }
                            } catch (error) {
                                console.error('Payment processing error:', error);
                                window.location.href = `/payment_status/failure`;
                            }
                        },
                        onError: (error) => {
                            console.error('Card payment brick error:', error);
                        },
                    },
                };

                window.cardPaymentBrickController = await bricksBuilder.create(
                    'cardPayment', 
                    'cardPaymentBrick_container', 
                    settings
                );
            } catch (error) {
                console.error('Failed to render card payment brick:', error);
                document.getElementById('cardPaymentBrick_container').innerHTML = 
                    '<div style="text-align: center; color: red; padding: 20px;">Failed to load payment form. Please refresh the page.</div>';
            }
        };

        renderCardPaymentBrick();
    </script>
</body>
</html>
