<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Status - Hedgi</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .status-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        #statusScreenBrick_container {
            margin: 20px 0;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .failure-message {
            text-align: center;
            padding: 40px 20px;
        }
        .failure-message h2 {
            color: #e74c3c;
            margin-bottom: 20px;
        }
        .failure-message p {
            color: #666;
            margin-bottom: 30px;
        }
        .retry-button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .retry-button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="header">
            <h1>Payment Status</h1>
        </div>
        
        {{#if isFailure}}
        <div class="failure-message">
            <h2>Payment Failed</h2>
            <p>Your payment could not be processed. Please try again with a different payment method.</p>
            <a href="/payment?amount={{AMOUNT}}" class="retry-button">Try Again</a>
        </div>
        {{else}}
        <div id="statusScreenBrick_container">
            <div class="loading">Loading payment status...</div>
        </div>
        {{/if}}
    </div>

    {{#unless isFailure}}
    <script>
        const mp = new MercadoPago('{{PUBLIC_KEY}}', { locale: 'pt-BR' });
        const bricksBuilder = mp.bricks();

        const renderStatusScreenBrick = async () => {
            try {
                const settings = {
                    initialization: { 
                        paymentId: '{{PAYMENT_ID}}' 
                    },
                    customization: {
                        visual: {
                            hideStatusDetails: true,
                            hideTransactionDate: true,
                            style: { theme: 'default' },
                        },
                        backUrls: {
                            error: '/error',
                            return: '/dashboard',
                        },
                    },
                    callbacks: {
                        onReady: async () => {
                            console.log('Status screen ready, placing trade...');
                            
                            // Auto-place trade on successful payment
                            try {
                                const response = await fetch('/api/trades', {
                                    method: 'POST',
                                    headers: { 
                                        'Content-Type': 'application/json' 
                                    },
                                    body: JSON.stringify({
                                        symbol: "{{SYMBOL}}",
                                        volume: {{VOLUME}},
                                        direction: "{{DIRECTION}}",
                                        metadata: {
                                            days: {{DAYS}},
                                            paymentToken: '{{PAYMENT_ID}}',
                                            margin: {{MARGIN}}
                                        }
                                    })
                                });
                                
                                const result = await response.json();
                                console.log('Trade placement result:', result);
                                
                                if (result.success) {
                                    console.log('Hedge successfully placed!');
                                    
                                    // Redirect to dashboard after 3 seconds
                                    setTimeout(() => {
                                        window.location.href = '/dashboard';
                                    }, 3000);
                                } else {
                                    console.error('Trade placement failed:', result);
                                }
                            } catch (error) {
                                console.error('Trade placement error:', error);
                            }
                        },
                        onError: (error) => {
                            console.error('Status screen error:', error);
                        },
                    },
                };
                
                await bricksBuilder.create('statusScreen', 'statusScreenBrick_container', settings);
            } catch (error) {
                console.error('Failed to render status screen brick:', error);
                document.getElementById('statusScreenBrick_container').innerHTML = 
                    '<div style="text-align: center; color: red; padding: 20px;">Failed to load status screen. <a href="/dashboard">Return to Dashboard</a></div>';
            }
        };

        renderStatusScreenBrick();
    </script>
    {{/unless}}
</body>
</html>
